# ============================================================================
# Videntia — Continuous Deployment
# Runs only when changes land on main
#
# Jobs are skipped (not failed) when secrets are not yet configured.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN       — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — from .vercel/project.json after `vercel link`
#   HF_TOKEN           — from https://huggingface.co/settings/tokens (write scope)
#   HF_SPACE_NAME      — e.g. "yourname/videntia-api"
#
# ============================================================================

name: CD

on:
  push:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Deploy frontend to Vercel
  # Skipped automatically if VERCEL_TOKEN secret is not set.
  # --------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    # Only run when the secret exists
    if: ${{ secrets.VERCEL_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

  # --------------------------------------------------------------------------
  # Deploy backend to Hugging Face Spaces
  # Skipped automatically if HF_TOKEN secret is not set.
  # --------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend → HF Spaces
    runs-on: ubuntu-latest
    # Only run when the secret exists
    if: ${{ secrets.HF_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.email "ci@videntia"
          git config --global user.name "Videntia CI"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add huggingface \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_NAME}"
          git push huggingface main --force
