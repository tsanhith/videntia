# ============================================================================
# Videntia — Continuous Deployment
# Runs only when changes land on main
# ============================================================================
#
# Required GitHub Secrets:
#   VERCEL_TOKEN       — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — from .vercel/project.json after `vercel link`
#   HF_TOKEN           — from https://huggingface.co/settings/tokens (write scope)
#   HF_SPACE_NAME      — e.g. "yourname/videntia-api"
#
# ============================================================================

name: CD

on:
  push:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Deploy frontend to Vercel
  # NOTE: If you already have Vercel's GitHub integration enabled (auto-deploy),
  # you can delete this job — Vercel will deploy automatically on every push.
  # --------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # --------------------------------------------------------------------------
  # Deploy backend to Hugging Face Spaces
  # HF Spaces works like a git remote — we push and HF rebuilds the Space.
  # --------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend → HF Spaces
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so HF gets a clean push

      - name: Configure git identity
        run: |
          git config --global user.email "ci@videntia"
          git config --global user.name "Videntia CI"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Add HF Space as a remote (auth via token in URL)
          git remote add huggingface \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_NAME}"

          # Force-push main → HF Space triggers a redeploy
          git push huggingface main --force
